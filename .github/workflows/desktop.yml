name: Desktop installers

# Builds SoeMind Forge Desktop for Windows (.exe/.msi), macOS (.dmg, universal),
# and Linux (.AppImage/.deb) and attaches them to a draft GitHub release.
# Trigger: push a tag like desktop-v0.1.0, or run manually.

on:
  push:
    tags:
      - "desktop-v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            args: ""
          - platform: windows-latest
            args: ""
          - platform: macos-latest
            args: "--target universal-apple-darwin"

    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev librsvg2-dev libayatana-appindicator3-dev libxdo-dev patchelf

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri

      - name: Install Tauri CLI
        run: npm install
        working-directory: desktop

      - name: Build and release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: desktop
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || 'desktop-dev' }}
          releaseName: "SoeMind Forge Desktop ${{ github.ref_type == 'tag' && github.ref_name || '(dev build)' }}"
          releaseBody: "Installer + launcher for the SoeMind Forge AI content studio. Windows: .exe/.msi · macOS: .dmg · Linux: .AppImage/.deb"
          releaseDraft: true
          args: ${{ matrix.args }}
