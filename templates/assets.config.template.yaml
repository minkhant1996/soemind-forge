# =============================================================================
# ASSET REGISTRY  —  projects/{name}/config/assets.yaml
# =============================================================================
# Persistent, reusable record of every visual/audio identity in a project:
# characters (talent), products, logos, voices, locations, music, style refs.
#
# WHY THIS EXISTS
#   So an agent never re-describes or re-generates the same character/product
#   for every piece of content. Generate (or register) once → save the path →
#   reuse forever with consistency.
#
# RULES FOR THE AGENT
#   1. Read this file during pre-flight (see skills/content-preflight).
#   2. Before generating any visual subject, look for an existing asset here.
#   3. When you generate or receive a new reusable asset, APPEND an entry and
#      save the file under projects/{name}/assets/<type>/.
#   4. NEVER invent a `path:` — only record paths to files that actually exist.
#   5. `locked: true` means "do not regenerate" — reuse the exact files for
#      visual consistency across all content.
#   6. All paths are RELATIVE to the project root (projects/{name}/).
# =============================================================================

project: ""                 # project slug, e.g. "summer-campaign"
updated: ""                 # ISO date of last change, e.g. "2026-06-26"

# -----------------------------------------------------------------------------
# CHARACTERS / TALENT  — any human (or mascot) that appears on screen or speaks
# -----------------------------------------------------------------------------
characters: []
# - id: char-founder                 # stable kebab-case id, referenced by content plans
#   label: "Founder – Sarah"
#   description: >
#     Late-20s East-Asian woman, shoulder-length black hair, warm smile,
#     minimalist beige knit, small gold hoop earrings.
#   role: spokesperson                # spokesperson | customer | mascot | extra
#   source: generated                 # generated | provided | real-person
#   status: ready                     # ready | needs-generation | placeholder
#   locked: true                      # reuse exact files; do not regenerate
#   files:                            # one ref per angle/state — more angles = better consistency
#     front: assets/characters/sarah-front.png
#     three_quarter: assets/characters/sarah-34.png
#     profile: assets/characters/sarah-profile.png
#     full_body: assets/characters/sarah-body.png
#   wardrobe: ["beige knit", "white tee"]   # outfits to keep consistent
#   linked_voice: voice-sarah          # id of a voice entry below (audio identity)
#   consent:                           # REQUIRED when source: real-person
#     real_person: false
#     release_on_file: false           # signed likeness release exists?
#     notes: ""
#   person_generation: allow           # allow | block  (passed to image/video API)
#   notes: ""
#   created: ""

